<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Administración Pedidos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #7c3aed 0, transparent 35%),
        radial-gradient(circle at bottom right, #06b6d4 0, transparent 35%),
        #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .app {
      width: 100%;
      max-width: 1000px;
      text-align: center;
      display: none;
    }

    h1 {
      font-size: clamp(32px, 5vw, 56px);
      margin-bottom: 12px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      margin-bottom: 45px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: white;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      padding: 35px;
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.45);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .project-logo {
      width: 180px;
      height: 180px;
      margin: 0 auto 22px;
      background: white;
      border-radius: 28px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .project-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card h2 {
      font-size: 26px;
      margin-bottom: 12px;
    }

    .card p {
      color: #cbd5e1;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.16);
      color: #86efac;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    .login {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      padding: 35px;
      text-align: center;
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
    }

    .login h1 {
      font-size: 34px;
      margin-bottom: 12px;
    }

    .login p {
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    .login input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 18px;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
    }

    .login button {
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 16px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    }

    .error {
      color: #fca5a5;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>

<body>
  <section class="login" id="login">
    <h1>Administración Pedidos</h1>
    <p>Introduce la clave de acceso</p>
    <input id="password" type="password" placeholder="Clave" autocomplete="off">
    <button onclick="checkPassword()">Entrar</button>
    <div class="error" id="error">Clave incorrecta</div>
  </section>

  <main class="app" id="app">
    <h1>Administración Pedidos</h1>
    <p class="subtitle">Selecciona el proyecto que quieres gestionar</p>

    <section class="cards">
      <a class="card" href="https://pedidos-lojo-polvillo.vercel.app/admin">
        <div class="project-logo">
          <img src="img/polvillo.png" alt="Pedidos Polvillo">
        </div>
        <h2>Pedidos Polvillo</h2>
        <p>Accede al panel de administración.</p>
        <div class="status">● Online</div>
      </a>

      <a class="card" href="https://pedidos-lojo.vercel.app/?admin">
        <div class="project-logo">
          <img src="img/lojo.png" alt="Pedidos Lojo">
        </div>
        <h2>Pedidos Lojo</h2>
        <p>Accede al panel de administración.</p>
        <div class="status">● Online</div>
      </a>
    </section>
  </main>

  <script>
    const ACCESS_CODE = "LOJOCESTA";
    const ACCESS_KEY = "administracion_pedidos_access";
    const ONE_DAY = 24 * 60 * 60 * 1000;

    function showApp() {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
    }

    function checkPassword() {
      const value = document.getElementById("password").value;

      if (value === ACCESS_CODE) {
        localStorage.setItem(ACCESS_KEY, Date.now().toString());
        showApp();
      } else {
        document.getElementById("error").style.display = "block";
      }
    }

    document.getElementById("password").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });

    const lastAccess = localStorage.getItem(ACCESS_KEY);

    if (lastAccess && Date.now() - Number(lastAccess) < ONE_DAY) {
      showApp();
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        const registration = await navigator.serviceWorker.register("./sw.js");
        registration.update();

        navigator.serviceWorker.addEventListener("controllerchange", () => {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
