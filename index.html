<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Administración Pedidos</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pedidos">
  <link rel="apple-touch-icon" href="img/icon-192.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #7c3aed 0, transparent 35%),
        radial-gradient(circle at bottom right, #06b6d4 0, transparent 35%),
        #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .app {
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    h1 {
      font-size: clamp(32px, 5vw, 56px);
      margin-bottom: 12px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 18px;
      margin-bottom: 45px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: white;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 28px;
      padding: 35px;
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 35px 80px rgba(0, 0, 0, 0.45);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .project-logo {
      width: 180px;
      height: 180px;
      margin: 0 auto 22px;
      background: white;
      border-radius: 28px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .project-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card h2 {
      font-size: 26px;
      margin-bottom: 12px;
    }

    .card p {
      color: #cbd5e1;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.16);
      color: #86efac;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
    }
  

#authOverlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top left, #7c3aed 0, transparent 35%),
    radial-gradient(circle at bottom right, #06b6d4 0, transparent 35%),
    #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 24px;
}

#authBox {
  width: min(380px, 94vw);
  background: rgba(255,255,255,0.96);
  color: #0f172a;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 30px 90px rgba(0,0,0,0.45);
  text-align: center;
}

#authBox h2 {
  margin-bottom: 10px;
  font-size: 28px;
}

#authBox p {
  color: #475569;
  margin-bottom: 18px;
}

#authBox input {
  width: 100%;
  padding: 13px 14px;
  margin: 8px 0 14px;
  border: 1px solid #cbd5e1;
  border-radius: 14px;
  font-size: 16px;
}

#authBox button,
#logoutButton {
  border: 0;
  border-radius: 14px;
  font-weight: 800;
  cursor: pointer;
}

#authBox button {
  width: 100%;
  padding: 13px 14px;
  background: #0f172a;
  color: white;
  font-size: 16px;
}

#authError {
  min-height: 20px;
  margin-top: 12px;
  color: #dc2626 !important;
  font-weight: 700;
}

#logoutButton {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 50;
  background: rgba(255,255,255,0.16);
  color: white;
  border: 1px solid rgba(255,255,255,0.28);
  padding: 9px 13px;
  backdrop-filter: blur(12px);
}

#logoutButton:hover {
  background: rgba(255,255,255,0.26);
}


</style>
</head>

<body>
  <main class="app">
    <h1>Administración Pedidos</h1>
    <p class="subtitle">Selecciona el proyecto que quieres gestionar</p>

    <section class="cards">
      <a class="card" href="https://pedidos-lojo-polvillo.vercel.app/admin">
        <div class="project-logo">
          <img src="img/polvillo.png" alt="Pedidos Polvillo">
        </div>
        <h2>Pedidos Polvillo</h2>
        <p>Accede al panel de administración.</p>
        <div class="status">● Online</div>
      </a>

      <a class="card" href="https://pedidos-lojo.vercel.app/?admin">
        <div class="project-logo">
          <img src="img/lojo.png" alt="Pedidos Lojo">
        </div>
        <h2>Pedidos Lojo</h2>
        <p>Accede al panel de administración.</p>
        <div class="status">● Online</div>
      </a>
    </section>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>


<script>
const APP_PASSWORD_HASH = "d862ee262b0ade64a88dba0b94c993bf29bba9688657650da4474845ec579add"; // Hash SHA-256 de la contraseña actual: CAMBIAR123
const DAY_KEY = "admin_day";
const AUTH_KEY = "admin_ok";
const LAST_KEY = "admin_last";
const INACTIVITY_LIMIT_MS = 15 * 60 * 1000;

function today() {
  return new Date().toISOString().slice(0, 10);
}

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map((byte) => byte.toString(16).padStart(2, "0"))
    .join("");
}

function isAuthenticated() {
  return (
    localStorage.getItem(AUTH_KEY) === "1" &&
    localStorage.getItem(DAY_KEY) === today()
  );
}

function markActivity() {
  localStorage.setItem(LAST_KEY, String(Date.now()));
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  localStorage.removeItem(LAST_KEY);
  showLogin();
}

function showLogoutButton() {
  if (document.getElementById("logoutButton")) return;

  const button = document.createElement("button");
  button.id = "logoutButton";
  button.type = "button";
  button.textContent = "Cerrar sesión";
  button.addEventListener("click", logout);
  document.body.appendChild(button);
}

function hideLogoutButton() {
  document.getElementById("logoutButton")?.remove();
}

function showLogin() {
  hideLogoutButton();

  if (document.getElementById("authOverlay")) return;

  document.body.insertAdjacentHTML(
    "beforeend",
    `<div id="authOverlay">
      <div id="authBox">
        <h2>Acceso</h2>
        <p>Introduce la clave para entrar en Administración Pedidos.</p>
        <input id="authPassword" type="password" placeholder="Contraseña" autocomplete="current-password" />
        <button id="authEnter" type="button">Entrar</button>
        <p id="authError"></p>
      </div>
    </div>`
  );

  const input = document.getElementById("authPassword");
  const button = document.getElementById("authEnter");
  const error = document.getElementById("authError");

  async function validatePassword() {
    const passwordHash = await sha256(input.value);

    if (passwordHash === APP_PASSWORD_HASH) {
      localStorage.setItem(AUTH_KEY, "1");
      localStorage.setItem(DAY_KEY, today());
      markActivity();
      document.getElementById("authOverlay")?.remove();
      showLogoutButton();
      input.value = "";
      return;
    }

    error.textContent = "Contraseña incorrecta";
    input.value = "";
    input.focus();
  }

  button.addEventListener("click", validatePassword);
  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      validatePassword();
    }
  });

  setTimeout(() => input.focus(), 80);
}

function checkSession() {
  if (!isAuthenticated()) {
    showLogin();
    return;
  }

  const lastActivity = Number(localStorage.getItem(LAST_KEY) || 0);

  if (!lastActivity || Date.now() - lastActivity > INACTIVITY_LIMIT_MS) {
    logout();
    return;
  }

  showLogoutButton();
}

["click", "touchstart", "keydown", "mousemove", "scroll"].forEach((eventName) => {
  document.addEventListener(
    eventName,
    () => {
      if (isAuthenticated()) markActivity();
    },
    { passive: true }
  );
});

window.addEventListener("load", () => {
  if (isAuthenticated()) {
    markActivity();
    showLogoutButton();
  } else {
    showLogin();
  }
});

window.addEventListener("focus", checkSession);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") checkSession();
});

setInterval(checkSession, 10000);
</script>


</body>
</html>
