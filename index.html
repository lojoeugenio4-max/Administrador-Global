<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Administración</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#7c3aed 0,transparent 35%),
    radial-gradient(circle at bottom right,#06b6d4 0,transparent 35%),
    #0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.app{
    width:100%;
    max-width:1000px;
    text-align:center;
}

.logo{
    font-size:48px;
    margin-bottom:15px;
}

h1{
    font-size:clamp(32px,5vw,56px);
    margin-bottom:12px;
}

.subtitle{
    color:#cbd5e1;
    font-size:18px;
    margin-bottom:45px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.22);
    border-radius:28px;
    padding:35px;
    backdrop-filter:blur(18px);
    box-shadow:0 25px 60px rgba(0,0,0,.35);
    transition:.25s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 35px 80px rgba(0,0,0,.45);
}

.logo-proyecto{
    width:130px;
    height:130px;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-proyecto img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.card h2{
    font-size:28px;
    margin-bottom:12px;
}

.card p{
    color:#cbd5e1;
    margin-bottom:25px;
    line-height:1.5;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(34,197,94,.16);
    color:#86efac;
    padding:8px 14px;
    border-radius:999px;
    font-size:14px;
    margin-bottom:24px;
}

.button{
    display:inline-block;
    width:100%;
    padding:15px;
    border-radius:16px;
    text-decoration:none;
    color:#fff;
    font-weight:bold;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    transition:.2s;
}

.button:hover{
    transform:scale(1.03);
}

footer{
    margin-top:40px;
    color:#94a3b8;
    font-size:14px;
}
</style>

</head>

<body>

<main class="app">

<div class="logo">🚀</div>

<h1>Centro de Administración</h1>

<p class="subtitle">
Selecciona el proyecto que quieres gestionar
</p>

<section class="cards">

<article class="card">

<div class="logo-proyecto">
<img src="img/Logo Polvillo.webp" alt="Pedidos Polvillo">
</div>

<h2>Pedidos Polvillo</h2>

<p>
Accede al panel de administración.
</p>

<div class="status">
● Online
</div>

<a class="button"
href="TU_URL_PANEL_1"
target="_blank">
Entrar al panel
</a>

</article>

<article class="card">

<div class="logo-proyecto">
<img src="img/logo-lojo.jpg" alt="Pedidos Lojo">
</div>

<h2>Pedidos Lojo</h2>

<p>
Accede al panel de administración.
</p>

<div class="status">
● Online
</div>

<a class="button"
href="TU_URL_PANEL_2"
target="_blank">
Entrar al panel
</a>

</article>

</section>

<footer>
Panel privado · Gestión rápida de proyectos
</footer>

</main>

</body>
</html>
